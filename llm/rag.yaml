COURSES:
  - id: robotics_junior
    title: Младшая Робототехника (3–7 лет)
    age_min: 3
    age_max: 7
    difficulty: beginner
    lesson_duration: 1h20m
    equipment: Lego WeDo 2.0
    prerequisites: нет
    when_to_offer: первый опыт обучения, любит конструкторы, быстро теряет внимание, нужна мягкая адаптация к занятиям
    description:
      Курс направлен на развитие мелкой моторики, математического счёта, цветового восприятия и алгоритмического мышления. 
      Дети в игровой форме осваивают основы программирования и робототехники.
      Используются специальные конструкторы, позволяющие двигаться от простых моделей к более сложным. 
      Уже на первом занятии ребёнок соберёт собственного робота.

    skills:
      - базовые алгоритмы
      - причинно-следственные связи
      - моторика
    child_outcomes:
      - собирает простых роботов
      - понимает последовательности действий
      - У ребёнка развивается объемное мышление, навыки счёта, умение выстраивать логические последовательности
      - и презентовать проекты. Дипломы по уровням обучения.

    parent_value:
      - подготовка к школе
      - развитие усидчивости
    tags:
      - робототехника
      - первое обучение
      - дошкольники
    progression_next:
      - robotics_middle
      - scratch

  - id: robotics_middle

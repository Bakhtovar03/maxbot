    age_min: 7
    age_max: 14
    difficulty: beginner_intermediate
    lesson_duration: 1h20m
    equipment: Lego Mindstorms EV3
    prerequisites: robotics_junior или базовая логика
    when_to_offer: интерес к технике, задаёт вопросы как устроены вещи, любит разбирать игрушки, хочет участвовать в соревнованиях
    description:
      Развитие навыков проектирования, конструирования и программирования. 
      Обучение сочетает практические игровые методики и групповые форматы, развивающие коммуникативные 
      и творческие компетенции. Изучение основ автоматизации роботизированных систем.
    skills:
      - механика
      - датчики и автоматизация
      - алгоритмы управления
      - У ребёнка развиваются креативное мышление, знания физических принципов механического движения и детектирования,
        математики, основ программирования и умение презентовать проекты. Дипломы по уровням обучения. 
        Участие в соревнованиях различного уровня.

    child_outcomes:
      - проектирует и программирует роботов
      - участвует в соревнованиях
    parent_value:
      - инженерное мышление
    tags:
      - инженерия
      - техника
    progression_next:
      - industrial_robotics
      - python

